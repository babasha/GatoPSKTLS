name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lib-tests:
    name: lib tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The `openssl` dev-dep needs system libssl headers — preinstalled on
      # `ubuntu-latest` runners. On Windows MSVC the `openssl-sys` build
      # script can't find the library, so we don't run lib-tests there.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  no-std-build:
    name: no_std build check (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --target thumbv7em-none-eabi

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run --allow-dirty
